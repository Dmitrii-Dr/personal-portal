spring.application.name=personal-portal-test

# Use in-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Flyway for tests
spring.flyway.enabled=false

# JPA configuration for H2
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.task.scheduling.enabled=false

# Admin user config
admin.user.email=admin@test.com
admin.user.password=test123

# JWT configuration (test values)
jwt.secret.key=test-secret-key-for-jwt-token-generation-256-bits-minimum
jwt.issuer=personal-portal-test
jwt.audience=personal-portal-api-test
jwt.access-token-ttl-minutes=10
jwt.refresh-token-idle-ttl-minutes=1440
jwt.refresh-token-absolute-ttl-minutes=10080
jwt.refresh-token-cleanup-interval-ms=3600000

# Account verification code configuration
account.verification.code.expiry-minutes=10
account.verification.code.max-attempts=5

# AWS Configuration (test values)
# Object Storage Configuration (for testing)
cloud.aws.region.static=us-east-1
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key
cloud.aws.s3.endpoint=
cloud.aws.s3.path-style-access=false
aws.s3.bucket-name=test-bucket

# Email Configuration (test - using mock SMTP)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.from.email=test@test.com
spring.mail.from.name=Test Portal

spring.application.name=personal-portal

# CORS configuration
# IMPORTANT: set to your real frontend/proxy origins (comma-separated).
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.hikari.auto-commit=false

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Admin user configuration (for testing - use env variables in production)
admin.user.email=${ADMIN_USER_EMAIL}
admin.user.password=${ADMIN_USER_PASSWORD}
admin.support.email=${ADMIN_SUPPORT_EMAIL}

# JWT configuration
jwt.issuer=${JWT_ISSUER}
jwt.audience=${JWT_AUDIENCE}
jwt.access-token-ttl-minutes=${JWT_ACCESS_TOKEN_TTL_MINUTES:10}
jwt.refresh-token-idle-ttl-minutes=${JWT_REFRESH_TOKEN_IDLE_TTL_MINUTES:1440}
#jwt.refresh-token-idle-ttl-minutes=${JWT_REFRESH_TOKEN_IDLE_TTL_MINUTES:2}
jwt.refresh-token-absolute-ttl-minutes=${JWT_REFRESH_TOKEN_ABSOLUTE_TTL_MINUTES:10080}
#jwt.refresh-token-absolute-ttl-minutes=${JWT_REFRESH_TOKEN_ABSOLUTE_TTL_MINUTES:3}
jwt.refresh-token-cleanup-interval-ms=${JWT_REFRESH_TOKEN_CLEANUP_INTERVAL_MS:3600000}
jwt.secret.key=${JWT_SECRET_KEY}

# Account verification code configuration
account.verification.code.expiry-minutes=${ACCOUNT_VERIFICATION_CODE_EXPIRY_MINUTES:60}
account.verification.code.max-attempts=${ACCOUNT_VERIFICATION_CODE_MAX_ATTEMPTS:5}
account.verification.resend.max-per-day=${ACCOUNT_VERIFICATION_RESEND_MAX_PER_DAY:5}


cloud.aws.region.static=${CLOUD_AWS_REGION_STATIC:}
cloud.aws.credentials.access-key=${CLOUD_AWS_CREDENTIALS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${CLOUD_AWS_CREDENTIALS_SECRET_KEY:}

# Custom endpoint for S3-compatible providers (leave empty for AWS S3)
cloud.aws.s3.endpoint=${CLOUD_AWS_S3_ENDPOINT:}

# Path-style access (required by some providers like MinIO)
# Set to true if your provider requires path-style URLs (bucket.endpoint vs endpoint/bucket)
cloud.aws.s3.path-style-access=${CLOUD_AWS_S3_PATH_STYLE_ACCESS:false}

# Bucket name
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
app.frontend.url=${APP_FRONTEND_URL}

# Email — production default: Yandex Cloud Postbox (Amazon SES API via AWS SDK). Dev profile uses SMTP (Mailpit).
# Transport: postbox | smtp
app.email.transport=${APP_EMAIL_TRANSPORT:postbox}

# No JavaMailSender bean in default prod (Postbox only). Dev/test profiles clear this to enable Mailpit/local SMTP.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

spring.mail.from.email=${SPRING_MAIL_FROM_EMAIL}
spring.mail.from.name=${SPRING_MAIL_FROM_NAME}

# Yandex Cloud Postbox — SES-compatible endpoint and static keys (https://yandex.cloud/en/docs/postbox/)
postbox.endpoint=${POSTBOX_ENDPOINT:https://postbox.cloud.yandex.net}
postbox.region=${POSTBOX_REGION:ru-central1}
postbox.access-key-id=${POSTBOX_ACCESS_KEY_ID}
postbox.secret-access-key=${POSTBOX_SECRET_ACCESS_KEY}


# Optional: absolute path to a directory containing custom email templates.
# When set, templates are loaded from this directory first; missing files fall back to classpath.
spring.mail.templates.directory=${SPRING_MAIL_TEMPLATES_DIRECTORY:}

# Multipart upload limits
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB


management.endpoints.web.exposure.include=health,metrics,loggers,logfile

# Do not leak internal health details on the public health endpoint.
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
# SBA server mounted at /admin/sba (so UI and API are under that path)
spring.boot.admin.context-path=/admin/sba
# Do not forward Origin to proxied actuator: inner response would get CORS headers and SBA would
# merge them with the outer CorsFilter, producing duplicate Access-Control-Allow-Origin (browser error).
# Replaces SBA default ignored-headers set; must repeat Cookie/Set-Cookie/Authorization.
spring.boot.admin.instance-proxy.ignored-headers=Cookie, Set-Cookie, Authorization, Origin
# SBA client registers to the same instance (default 8080 so placeholder resolves when client binds early)
spring.boot.admin.client.url=http://localhost:${server.port:8080}/admin/sba
# SBA client credentials for HTTP Basic (registration + UI: use these in the browser auth prompt at /admin/sba)
spring.boot.admin.client.username=${SBA_CLIENT_USERNAME}
spring.boot.admin.client.password=${SBA_CLIENT_PASSWORD}
# Same credentials for SBA server -> actuator (metrics, env, etc.); health stays public without auth
spring.boot.admin.client.instance.metadata.user.name=${SBA_CLIENT_USERNAME}
spring.boot.admin.client.instance.metadata.user.password=${SBA_CLIENT_PASSWORD}
# Base URL for SBA UI assets/links
spring.boot.admin.ui.public-url=${SPRING_BOOT_ADMIN_UI_PUBLIC_URL:/admin/sba}
server.forward-headers-strategy=native

# Logging: fixed file for SBA log viewer; correlation id from MDC (see CorrelationIdFilter)
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%X{correlationId}] %5p ${PID:- } --- [%t] %-40.40logger{39} : %m%n%wEx
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%X{correlationId}] %5p ${PID:- } --- [%t] %-40.40logger{39} : %m%n%wEx
logging.file.name=logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=500MB
logging.logback.rollingpolicy.clean-history-on-start=false

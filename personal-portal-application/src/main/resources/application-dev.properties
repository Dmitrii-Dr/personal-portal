# Development profile (local-friendly defaults)
# Overrides unresolved ${...} placeholders from application.properties so the app starts without env vars.

# CORS configuration (Vite dev + preview)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Database configuration (local docker-compose default)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5422/personal_portal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JPA
spring.jpa.show-sql=true

# Admin user (local seed; override with ADMIN_USER_* in production-like dev)
admin.user.email=${ADMIN_USER_EMAIL:admin@localhost}
admin.user.password=${ADMIN_USER_PASSWORD:changeme}
admin.support.email=${ADMIN_SUPPORT_EMAIL:support@localhost}

# JWT (dev defaults; same fallbacks as optional TTLs in application.properties)
jwt.secret.key=${JWT_SECRET_KEY:test-secret-key-for-jwt-token-generation-256-bits-minimum}
jwt.issuer=${JWT_ISSUER:personal-portal}
jwt.audience=${JWT_AUDIENCE:personal-portal-api}
jwt.access-token-ttl-minutes=${JWT_ACCESS_TOKEN_TTL_MINUTES:10}
jwt.refresh-token-idle-ttl-minutes=${JWT_REFRESH_TOKEN_IDLE_TTL_MINUTES:1440}
jwt.refresh-token-absolute-ttl-minutes=${JWT_REFRESH_TOKEN_ABSOLUTE_TTL_MINUTES:10080}
jwt.refresh-token-cleanup-interval-ms=${JWT_REFRESH_TOKEN_CLEANUP_INTERVAL_MS:3600000}

# Account verification (explicit dev defaults)
account.verification.code.expiry-minutes=${ACCOUNT_VERIFICATION_CODE_EXPIRY_MINUTES:60}
account.verification.code.max-attempts=${ACCOUNT_VERIFICATION_CODE_MAX_ATTEMPTS:5}
account.verification.resend.max-per-day=${ACCOUNT_VERIFICATION_RESEND_MAX_PER_DAY:5}

# S3 client bean requires a non-empty region; credentials may be empty (default provider chain)
cloud.aws.region.static=${CLOUD_AWS_REGION_STATIC:us-east-1}
cloud.aws.credentials.access-key=${CLOUD_AWS_CREDENTIALS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${CLOUD_AWS_CREDENTIALS_SECRET_KEY:}
cloud.aws.s3.endpoint=${CLOUD_AWS_S3_ENDPOINT:}
cloud.aws.s3.path-style-access=${CLOUD_AWS_S3_PATH_STYLE_ACCESS:false}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:dev-bucket}

# Frontend URL (local)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Email (Mailpit) — SMTP instead of prod Postbox; re-enable Spring Mail (see application.properties)
app.email.transport=smtp
spring.autoconfigure.exclude=

# For local tests with app.email.transport=postbox
postbox.endpoint=${POSTBOX_ENDPOINT:https://postbox.cloud.yandex.net}
postbox.region=${POSTBOX_REGION:ru-central1}
postbox.access-key-id=${POSTBOX_ACCESS_KEY_ID:}
postbox.secret-access-key=${POSTBOX_SECRET_ACCESS_KEY:}

# Email (Mailpit)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.from.email=${SPRING_MAIL_FROM_EMAIL:noreply@personal-portal.com}
spring.mail.from.name=${SPRING_MAIL_FROM_NAME:Personal Portal}
spring.mail.templates.directory=${SPRING_MAIL_TEMPLATES_DIRECTORY:}

# Embedded SBA credentials (dev-only defaults)
spring.boot.admin.client.username=${SBA_CLIENT_USERNAME:sba-client}
spring.boot.admin.client.password=${SBA_CLIENT_PASSWORD:sba-client-secret}
spring.boot.admin.client.instance.metadata.user.name=${SBA_CLIENT_USERNAME:sba-client}
spring.boot.admin.client.instance.metadata.user.password=${SBA_CLIENT_PASSWORD:sba-client-secret}


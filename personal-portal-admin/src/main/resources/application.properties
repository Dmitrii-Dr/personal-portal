# Observability — REST request log (defaults; override in the main application or profiles)
# Retention window (days) for successful requests (2xx).
observability.request-log.retention-success-days=7
# Retention window (days) for non-success requests.
observability.request-log.retention-failure-days=30
# Daily retention job schedule (UTC) in Spring cron format.
observability.request-log.retention-cron=0 0 2 * * *
# Enables/disables retention cleanup scheduler.
observability.request-log.retention-job-enabled=true
# Max rows deleted by one SQL statement during retention.
observability.request-log.retention-delete-batch-size=500
# Safety cap for delete batches per retention run.
observability.request-log.retention-max-batches-per-run=200
# Hourly rollup schedule (UTC) in Spring cron format.
observability.request-log.rollup-cron=0 0 * * * *
# Enables/disables endpoint stats rollup scheduler.
observability.request-log.rollup-job-enabled=true
# Max request-log rows processed per rollup transaction.
observability.request-log.rollup-batch-size=1000
# Core threads for async request-log persistence executor.
observability.request-log.async-core-pool-size=2
# Max threads for async request-log persistence executor.
observability.request-log.async-max-pool-size=4
# Queue capacity for async request-log persistence tasks.
observability.request-log.async-queue-capacity=1000
# Max buffered records flushed in one write batch.
observability.request-log.async-flush-batch-size=100
# Max time (ms) records can stay buffered before flush.
observability.request-log.async-flush-interval-ms=60000 # 1 minute
# Enables/disables request body capture for request-log rows.
observability.request-log.request-body-enabled=true
# Maximum stored characters for sanitized request body payload.
observability.request-log.request-body-max-chars=16384
# Redacted replacement text for sensitive JSON fields.
observability.request-log.request-body-redaction-placeholder=***
# Placeholder persisted for non-JSON payloads.
observability.request-log.request-body-non-json-placeholder=[non-json omitted]
# Placeholder persisted when request body sanitization fails.
observability.request-log.request-body-sanitization-failed-placeholder=[sanitization_failed]
# Sensitive JSON keys (case-insensitive) to redact recursively.
observability.request-log.request-body-sensitive-keys=password,newpassword,oldpassword,token,accesstoken,refreshtoken,email,phone,firstname,lastname,fullname,address,birthdate
# Enables/disables sanitized request header metadata capture.
observability.request-log.request-header-metadata-enabled=true
# Enables/disables sanitized response header metadata capture.
observability.request-log.response-header-metadata-enabled=true
# Maximum stored characters for sanitized header metadata payload.
observability.request-log.header-metadata-max-chars=16384
# Redacted replacement text for sensitive header values.
observability.request-log.header-redaction-placeholder=***
# Placeholder persisted when header metadata sanitization fails.
observability.request-log.header-sanitization-failed-placeholder=[header_sanitization_failed]
# Sensitive header names (case-insensitive) to redact.
observability.request-log.header-sensitive-keys=authorization,proxy-authorization,cookie,set-cookie,x-api-key,x-auth-token,x-csrf-token,x-forwarded-for,forwarded,x-real-ip
